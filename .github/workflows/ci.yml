name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install ESPHome
        run: pip install esphome
      
      - name: Create dummy secrets
        run: |
          cat > secrets.yaml << 'EOF'
          wifi_ssid: "test_ssid"
          wifi_password: "test_password"
          mqtt_host: "192.168.1.1"
          mqtt_username: "test"
          mqtt_password: "test"
          api_encryption_key: "dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXRlc3Q="
          ota_password: "test"
          EOF
      
      - name: Validate ESPHome configs
        run: |
          for f in jbd-all-batteries*.yaml; do
            echo "Validating $f..."
            esphome config "$f" > /dev/null
          done
