name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install ESPHome
        run: pip install esphome
      
      - name: Validate ESPHome configs
        run: |
          for f in jbd-all-batteries*.yaml; do
            echo "Validating $f..."
            esphome config "$f" > /dev/null
          done
