      if (id(sensor_chain2_bms2_power).has_state()) total += id(sensor_chain2_bms2_power).state;
      if (id(sensor_chain2_bms3_power).has_state()) total += id(sensor_chain2_bms3_power).state;
      if (id(sensor_chain2_bms4_power).has_state()) total += id(sensor_chain2_bms4_power).state;
      return total;

  - platform: template
    name: "current_total_c2"
    id: chain2_total_current_sensor
    unit_of_measurement: "A"
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      float voltage = id(chain2_total_voltage_sensor).state;
      float power = id(chain2_total_power_sensor).state;
      if (voltage > 10) return power / voltage;
      return {};

  - platform: template
    name: "soc_total_c2"
    id: chain2_min_soc_sensor
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      std::vector<float> socs;
      if (id(sensor_chain2_bms1_soc).has_state()) socs.push_back(id(sensor_chain2_bms1_soc).state);
      if (id(sensor_chain2_bms2_soc).has_state()) socs.push_back(id(sensor_chain2_bms2_soc).state);
      if (id(sensor_chain2_bms3_soc).has_state()) socs.push_back(id(sensor_chain2_bms3_soc).state);
      if (id(sensor_chain2_bms4_soc).has_state()) socs.push_back(id(sensor_chain2_bms4_soc).state);
      if (socs.size() < 2) return socs.empty() ? NAN : socs[0];
      std::sort(socs.begin(), socs.end());
      if (socs[1] - socs[0] > 20.0f) {
        return socs[1];
      }
      return socs[0];

  - platform: template
    name: "capacity_total_c2"
    id: chain2_capacity_remaining_sensor
    unit_of_measurement: "Ah"
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      std::vector<float> values;
      if (id(sensor_chain2_bms1_capacity).has_state() && id(sensor_chain2_bms1_capacity).state > 5) values.push_back(id(sensor_chain2_bms1_capacity).state);
      if (id(sensor_chain2_bms2_capacity).has_state() && id(sensor_chain2_bms2_capacity).state > 5) values.push_back(id(sensor_chain2_bms2_capacity).state);
      if (id(sensor_chain2_bms3_capacity).has_state() && id(sensor_chain2_bms3_capacity).state > 5) values.push_back(id(sensor_chain2_bms3_capacity).state);
      if (id(sensor_chain2_bms4_capacity).has_state() && id(sensor_chain2_bms4_capacity).state > 5) values.push_back(id(sensor_chain2_bms4_capacity).state);
      if (values.empty()) return {};
      std::sort(values.begin(), values.end());
      if (values.size() >= 2 && (values[0] < values[1] * 0.7f)) {
        return values[1];
      }
      return values[0];

binary_sensor:
  # Chain 1 FET status (bms1-4)
  - platform: jbd_bms_ble
    jbd_bms_ble_id: chain1_bms1
    charging:
      name: "charging_bms1"
    discharging:
      name: "discharging_bms1"
  - platform: jbd_bms_ble
    jbd_bms_ble_id: chain1_bms2
    charging:
      name: "charging_bms2"
    discharging:
      name: "discharging_bms2"
  - platform: jbd_bms_ble
    jbd_bms_ble_id: chain1_bms3
    charging:
      name: "charging_bms3"
    discharging:
      name: "discharging_bms3"
  - platform: jbd_bms_ble
    jbd_bms_ble_id: chain1_bms4
    charging:
      name: "charging_bms4"
    discharging:
      name: "discharging_bms4"
  # Chain 2 FET status (bms5-8)
  - platform: jbd_bms_ble
    jbd_bms_ble_id: chain2_bms1
    charging:
      name: "charging_bms5"
    discharging:
      name: "discharging_bms5"
  - platform: jbd_bms_ble
    jbd_bms_ble_id: chain2_bms2
    charging:
      name: "charging_bms6"
    discharging:
      name: "discharging_bms6"
  - platform: jbd_bms_ble
    jbd_bms_ble_id: chain2_bms3
    charging:
      name: "charging_bms7"
    discharging:
      name: "discharging_bms7"
  - platform: jbd_bms_ble
    jbd_bms_ble_id: chain2_bms4
    charging:
      name: "charging_bms8"
    discharging:
      name: "discharging_bms8"
  - platform: status
    name: "esp32_status"

button:
  - platform: restart
    name: "restart"
    id: restart_esp

globals:
  - id: current_bms_index
    type: int
    restore_value: no
    initial_value: '-1'

# Clean interval - uses ble_client.connect action
interval:
  - interval: 20s
    then:
      - esp32_ble_tracker.stop_scan:
          id: ble_tracker
      - lambda: |-
          id(current_bms_index) = (id(current_bms_index) + 1) % 8;
          ESP_LOGI("cycle", ">>> Requesting BMS %d <<<", id(current_bms_index) + 1);
      - delay: 500ms
      - esp32_ble_tracker.start_scan:
          id: ble_tracker
      - delay: 500ms
      # Chain 1
      - if:
          condition:
            lambda: 'return id(current_bms_index) == 0;'
          then:
            - ble_client.connect: ble_chain1_bms1
      - if:
          condition:
            lambda: 'return id(current_bms_index) == 1;'
          then:
            - ble_client.connect: ble_chain1_bms2
      - if:
          condition:
            lambda: 'return id(current_bms_index) == 2;'
          then:
            - ble_client.connect: ble_chain1_bms3
      - if:
          condition:
            lambda: 'return id(current_bms_index) == 3;'
          then:
            - ble_client.connect: ble_chain1_bms4
      # Chain 2
      - if:
          condition:
            lambda: 'return id(current_bms_index) == 4;'
          then:
            - ble_client.connect: ble_chain2_bms1
      - if:
          condition:
            lambda: 'return id(current_bms_index) == 5;'
          then:
            - ble_client.connect: ble_chain2_bms2
      - if:
          condition:
            lambda: 'return id(current_bms_index) == 6;'
          then:
            - ble_client.connect: ble_chain2_bms3
      - if:
          condition:
            lambda: 'return id(current_bms_index) == 7;'
          then:
            - ble_client.connect: ble_chain2_bms4
