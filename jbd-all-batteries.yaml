      if (id(sensor_chain2_bms2_voltage).has_state() && id(sensor_chain2_bms2_voltage).state > 0) { total += id(sensor_chain2_bms2_voltage).state; count++; }
      if (id(sensor_chain2_bms3_voltage).has_state() && id(sensor_chain2_bms3_voltage).state > 0) { total += id(sensor_chain2_bms3_voltage).state; count++; }
      if (id(sensor_chain2_bms4_voltage).has_state() && id(sensor_chain2_bms4_voltage).state > 0) { total += id(sensor_chain2_bms4_voltage).state; count++; }
      if (count == 4) return total;
      if (count > 0) return (total / count) * 4;
