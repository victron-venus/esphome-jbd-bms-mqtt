# ESPHome config for ALL 8 JBD BMS batteries on ONE ESP32
# Event-driven model with auto_connect: false and explicit connect/disconnect
# Flash with: esphome run jbd-all-batteries.yaml

esphome:
  name: jbd-all-batteries
  friendly_name: "JBD Battery Monitor"
  on_boot:
    priority: -100
    then:
      - wait_until:
          wifi.connected:
      - delay: 5s
      - lambda: 'id(current_bms_index) = -1;'
      - logger.log: "Boot complete. Event-driven polling with auto_connect: false"

esp32:
  board: esp32dev
  variant: esp32
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_ACL_CONNECTIONS: "9"
      CONFIG_BT_GATTC_CONNECT_RETRY_COUNT: "3"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_ESP32_REV_MIN_3: "y"
    advanced:
      minimum_chip_revision: "3.1"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_pass
  domain: ".alvit.cf"
  power_save_mode: NONE
  ap:
    ssid: "jbd-all-batteries"
    password: !secret wifi_pass

captive_portal:

mqtt:
  broker: 192.168.160.150
  port: 1883
  topic_prefix: battery

logger:
  level: INFO
  logs:
    jbd_bms_ble: WARN

api:
  reboot_timeout: 0s

ota:
  platform: esphome

web_server:
  port: 80

external_components:
  - source: github://syssi/esphome-jbd-bms@main
    refresh: 1d
    components: [jbd_bms_ble]

esp32_ble:
  max_connections: 8

esp32_ble_tracker:
  id: ble_tracker
  scan_parameters:
    interval: 1200ms
    window: 600ms
    active: false
    continuous: false

# All 8 BMS with auto_connect: false
ble_client:
  # Chain 1
  - mac_address: "A5:C2:37:3F:F6:26"
    id: ble_chain1_bms1
    auto_connect: false
    on_connect:
      then:
        - logger.log: "C1/B1 connected"
        - delay: 1s
        - lambda: 'id(chain1_bms1).update();'
        - delay: 4s
        - lambda: |-
            float v = id(sensor_chain1_bms1_voltage).state;
            float c = id(sensor_chain1_bms1_current).state;
            float p = id(sensor_chain1_bms1_power).state;
            if (!isnan(v) && v > 0) {
              ESP_LOGI("bms", "C1/B1: %.2fV %.2fA %.1fW", v, c, p);
            } else {
              ESP_LOGW("bms", "C1/B1: NO DATA");
            }
        - ble_client.disconnect: ble_chain1_bms1

