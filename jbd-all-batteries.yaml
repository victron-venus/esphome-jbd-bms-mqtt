      name: "temperature1_bms8"
    cell_voltage_1:
      name: "voltage_cell1_bms8"
    cell_voltage_2:
      name: "voltage_cell2_bms8"
    cell_voltage_3:
      name: "voltage_cell3_bms8"
    cell_voltage_4:
      name: "voltage_cell4_bms8"

  # ESP32 Status
  - platform: wifi_signal
    name: "wifi_signal"
    update_interval: 60s
  - platform: uptime
    name: "uptime"
    update_interval: 60s

  # CHAIN 1 - Aggregated sensors
  - platform: template
    name: "voltage_total_c1"
    id: chain1_total_voltage_sensor
    unit_of_measurement: "V"
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      float total = 0; int count = 0;
      if (id(sensor_chain1_bms1_voltage).has_state() && id(sensor_chain1_bms1_voltage).state > 0) { total += id(sensor_chain1_bms1_voltage).state; count++; }
      if (id(sensor_chain1_bms2_voltage).has_state() && id(sensor_chain1_bms2_voltage).state > 0) { total += id(sensor_chain1_bms2_voltage).state; count++; }
      if (id(sensor_chain1_bms3_voltage).has_state() && id(sensor_chain1_bms3_voltage).state > 0) { total += id(sensor_chain1_bms3_voltage).state; count++; }
      if (id(sensor_chain1_bms4_voltage).has_state() && id(sensor_chain1_bms4_voltage).state > 0) { total += id(sensor_chain1_bms4_voltage).state; count++; }
      if (count == 4) return total;
      if (count > 0) return (total / count) * 4;
      return {};

  - platform: template
    name: "power_total_c1"
    id: chain1_total_power_sensor
    unit_of_measurement: "W"
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      float total = 0;
      if (id(sensor_chain1_bms1_power).has_state()) total += id(sensor_chain1_bms1_power).state;
      if (id(sensor_chain1_bms2_power).has_state()) total += id(sensor_chain1_bms2_power).state;
      if (id(sensor_chain1_bms3_power).has_state()) total += id(sensor_chain1_bms3_power).state;
      if (id(sensor_chain1_bms4_power).has_state()) total += id(sensor_chain1_bms4_power).state;
      return total;

  - platform: template
    name: "current_total_c1"
    id: chain1_total_current_sensor
    unit_of_measurement: "A"
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      float voltage = id(chain1_total_voltage_sensor).state;
      float power = id(chain1_total_power_sensor).state;
      if (voltage > 10) return power / voltage;
      return {};

  - platform: template
    name: "soc_total_c1"
    id: chain1_min_soc_sensor
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      std::vector<float> socs;
      if (id(sensor_chain1_bms1_soc).has_state()) socs.push_back(id(sensor_chain1_bms1_soc).state);
      if (id(sensor_chain1_bms2_soc).has_state()) socs.push_back(id(sensor_chain1_bms2_soc).state);
      if (id(sensor_chain1_bms3_soc).has_state()) socs.push_back(id(sensor_chain1_bms3_soc).state);
      if (id(sensor_chain1_bms4_soc).has_state()) socs.push_back(id(sensor_chain1_bms4_soc).state);
      if (socs.size() < 2) return socs.empty() ? NAN : socs[0];
      std::sort(socs.begin(), socs.end());
      if (socs[1] - socs[0] > 20.0f) {
        return socs[1];
      }
      return socs[0];

  - platform: template
    name: "capacity_total_c1"
    id: chain1_capacity_remaining_sensor
    unit_of_measurement: "Ah"
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      std::vector<float> values;
      if (id(sensor_chain1_bms1_capacity).has_state() && id(sensor_chain1_bms1_capacity).state > 5) values.push_back(id(sensor_chain1_bms1_capacity).state);
      if (id(sensor_chain1_bms2_capacity).has_state() && id(sensor_chain1_bms2_capacity).state > 5) values.push_back(id(sensor_chain1_bms2_capacity).state);
      if (id(sensor_chain1_bms3_capacity).has_state() && id(sensor_chain1_bms3_capacity).state > 5) values.push_back(id(sensor_chain1_bms3_capacity).state);
      if (id(sensor_chain1_bms4_capacity).has_state() && id(sensor_chain1_bms4_capacity).state > 5) values.push_back(id(sensor_chain1_bms4_capacity).state);
      if (values.empty()) return {};
      std::sort(values.begin(), values.end());
      if (values.size() >= 2 && (values[0] < values[1] * 0.7f)) {
        return values[1];
      }
      return values[0];

  # CHAIN 2 - Aggregated sensors
  - platform: template
    name: "voltage_total_c2"
    id: chain2_total_voltage_sensor
